name: memozen
description: "Learn faster. Remember longer. A spaced-repetition study app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  isar: ^2.5.0
  isar_flutter_libs: ^2.5.0
  flutter_local_notifications: ^17.1.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  uuid: ^4.2.2
  collection: ^1.18.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^2.5.0
  build_runner: ^2.4.8
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true


